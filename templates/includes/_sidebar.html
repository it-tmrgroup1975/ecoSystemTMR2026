<aside id="main-sidebar"
       class="fixed inset-y-0 left-0 z-[50] w-64 bg-slate-900 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">

    <div class="p-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-erp-purple rounded-lg flex items-center justify-center shadow-lg shadow-purple-500/20">
                <i class="bi bi-cpu text-white text-lg"></i>
            </div>
            <span class="text-xl font-bold text-white tracking-tight">ECO<span class="text-slate-400 font-light">SYSTEM</span></span>
        </div>
        <button class="md:hidden text-slate-400 hover:text-white" onclick="toggleMobileMenu()">
            <i class="bi bi-x-lg text-xl"></i>
        </button>
    </div>

    <nav class="px-4 space-y-1 overflow-y-auto h-[calc(100vh-170px)] custom-scrollbar">
        <a href="{% url 'dashboard' %}"
           class="group flex items-center px-3 py-3 text-sm font-medium rounded-xl transition-all
           {% if request.resolver_match.url_name == 'dashboard' %} text-white bg-white/10 shadow-sm {% else %} text-slate-400 hover:text-white hover:bg-white/5 {% endif %}">
            <i class="bi bi-house-door mr-3 text-lg {% if request.resolver_match.url_name == 'dashboard' %} text-erp-purple-light {% else %} group-hover:text-erp-purple-light {% endif %}"></i>
            Overview
        </a>

        <a href="{% url 'product_list' %}"
           class="group flex items-center px-3 py-3 text-sm font-medium rounded-xl transition-all
           {% if 'product' in request.resolver_match.url_name %} text-white bg-white/10 shadow-sm {% else %} text-slate-400 hover:text-white hover:bg-white/5 {% endif %}">
            <i class="bi bi-box-seam mr-3 text-lg {% if 'product' in request.resolver_match.url_name %} text-erp-purple-light {% else %} group-hover:text-erp-purple-light {% endif %}"></i>
            Inventory
        </a>
    </nav>

    <div class="absolute bottom-0 w-full p-4 bg-slate-900/80 backdrop-blur-md border-t border-white/5">

        <div id="user-dropdown"
             class="absolute bottom-20 left-4 right-4 bg-white rounded-2xl shadow-2xl border border-slate-200 py-2 hidden animate-in slide-in-from-bottom-2 duration-200 z-[60]">
            <div class="px-4 py-2 border-b border-slate-100 mb-1">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Account Settings</p>
            </div>
            <a href="{% url 'profile' %}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-erp-purple/5 hover:text-erp-purple transition-colors">
                <i class="bi bi-person-circle text-lg opacity-70"></i>
                <span class="font-semibold">My Profile</span>
            </a>
            <hr class="my-1 border-slate-100">
            <form action="{% url 'logout' %}" method="post" class="block w-full">
                {% csrf_token %}
                <button type="submit" class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 w-full text-left transition-colors">
                    <i class="bi bi-box-arrow-right text-lg opacity-70"></i>
                    <span class="font-semibold">Logout</span>
                </button>
            </form>
        </div>

        <div onclick="toggleUserDropdown(event)" class="flex items-center gap-3 p-2 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all cursor-pointer group active:scale-95">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-erp-purple to-purple-400 flex items-center justify-center text-white font-bold shadow-inner shrink-0 group-hover:shadow-purple-500/40 transition-all">
                {{ user.username|slice:":1"|upper }}
            </div>
            <div class="overflow-hidden flex-1">
                <p class="text-sm font-semibold text-white truncate">{{ user.username }}</p>
                <p class="text-[10px] text-slate-500 uppercase tracking-tighter truncate">
                    {{ user.company.name|default:"General Corp" }}
                </p>
            </div>
            <i class="bi bi-chevron-up text-slate-500 text-xs group-hover:text-white transition-colors"></i>
        </div>
    </div>
</aside>

<style>
    /* ปรับแต่ง Scrollbar ของเมนูให้ดูเนียนตาขึ้น */
    .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
    }
</style>
